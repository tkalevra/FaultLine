version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL (local, isolated)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-faultline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faultline}
      POSTGRES_DB: ${POSTGRES_DB:-faultline}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:--c log_statement=all}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - faultline-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faultline}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────────────────
  # FaultLine Backend API
  # ─────────────────────────────────────────────────────────────────────────────
  faultline:
    build:
      context: .
      dockerfile: Dockerfile
    image: faultline:latest
    container_name: faultline-api
    ports:
      - "8001:8001"
    environment:
      # Local PostgreSQL
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://faultline:faultline@postgres:5432/faultline}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

      # Qdrant (local)
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-faultline-test}

      # Redis (local)
      REDIS_URL: ${REDIS_URL:-redis://faultline-redis:6379/0}

      # LLM endpoint (OpenWebUI)
      OPENWEBUI_LLM_URL: ${OPENWEBUI_LLM_URL:-http://open-webui:3000/api/chat/completions}
      QWEN_API_URL: ${QWEN_API_URL:-http://ollama:11434/v1/chat/completions}

      # FaultLine API self-reference
      FAULTLINE_API_URL: ${FAULTLINE_API_URL:-http://faultline:8001}

      # LLM models
      WGM_LLM_MODEL: ${WGM_LLM_MODEL:-qwen/qwen3.5-9b}
      CATEGORY_LLM_MODEL: ${CATEGORY_LLM_MODEL:-qwen2.5-coder}

      # Timeouts
      HTTPX_TIMEOUT: ${HTTPX_TIMEOUT:-10}
      DB_TIMEOUT: ${DB_TIMEOUT:-30}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-10}

      # Pool sizes
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}

      # Rate limiting
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-100}

      # Re-embedder settings
      REEMBED_INTERVAL: ${REEMBED_INTERVAL:-10}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      open-webui:
        condition: service_healthy
    networks:
      - faultline-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────────
  # Open WebUI (UI + LLM router)
  # ─────────────────────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      # FaultLine integration via Valve config
      FAULTLINE_BACKEND_URL: ${FAULTLINE_API_URL:-http://faultline:8001}
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
    networks:
      - faultline-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────────
  # Qdrant (vector database)
  # ─────────────────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
      - ./config/qdrant_config.yaml:/qdrant/config/qdrant.yaml
    networks:
      - faultline-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis (inlet dedup cache)
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: faultline-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - faultline-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # Ollama (LLM inference backend)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0:11434}
    networks:
      - faultline-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  faultline-mcp:
    image: faultline:latest
    command: ["python", "tools/mcp_server.py", "--transport", "http", "--port", "8002"]
    ports:
      - "8002:8002"
    environment:
      FAULTLINE_API_URL: http://faultline:8001
      FAULTLINE_USER_ID: ${FAULTLINE_USER_ID:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
    depends_on:
      - faultline
    networks:
      - faultline-net

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  open_webui_data:
    driver: local

networks:
  faultline-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/16
