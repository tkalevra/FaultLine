name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: |
          pytest \
            tests/gli_ner/ \
            tests/schema_oracle/ \
            tests/wgm/ \
            tests/fact_store/ \
            tests/context_packager/ \
            tests/api/ \
            -q --tb=short
        env:
          POSTGRES_DSN: ""
          QWEN_API_URL: ""
          QDRANT_URL: ""
          QDRANT_COLLECTION: "faultline-test"
