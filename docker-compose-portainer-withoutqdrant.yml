version: "3.8"

# FaultLine WGM — Portainer Stack (WITHOUT Qdrant)
#
# This compose file assumes you already have Qdrant running in a separate stack.
# It will connect to your existing Qdrant instance via the shared network.
#
# IMPORTANT: This compose file references a PRE-BUILT Docker image.
# Before deploying this stack in Portainer, build the image on your Docker host:
#
#   cd /path/to/FaultLine
#   docker build -t faultline-wgm:latest .
#
# PREREQUISITES:
#   ✓ Qdrant already running (e.g., in rag-ai-qdrant stack)
#   ✓ Qdrant network name: rag-ai-qdrant_default
#   ✓ Qdrant hostname: qdrant
#   ✓ Qdrant port: 6333
#
# DEPLOYMENT OPTIONS:
#   Option 1: Web Editor (Portainer UI)
#     → Stacks → Add Stack → Web Editor → Paste this file → Deploy
#
#   Option 2: Git Repository (recommended for version control)
#     → Stacks → Add Stack → Git Repository
#     → Repository URL, Branch, Compose path: docker-compose-portainer-withoutqdrant.yml
#
# REQUIRED ENVIRONMENT VARIABLES (set in Portainer's "Environment variables" tab):
#   LLM_BASE_URL              - LLM base URL (internal: http://open-webui:8080)
#   LLM_BACKEND_TYPE          - Backend type: openwebui (default), ollama, openai, raw
#   LLM_API_KEY               - Bearer token for OpenWebUI authentication (sk-...)
#   FAULTLINE_URL             - FaultLine backend endpoint (http://your-host:8001)
#   POSTGRES_PASSWORD         - Database password for 'faultline' user
#   WGM_LLM_MODEL             - Extraction model name (qwen/qwen3.5-9b for full reasoning)
#   CATEGORY_LLM_MODEL        - Category inference model (qwen2.5-coder-1.5b-instruct for speed)
#   REEMBED_INTERVAL          - Re-embedder poll interval in seconds (default: 300)
#   REDIS_URL                 - Redis URL for inlet dedup (default: redis://redis:6379/0)
#   SHORT_TERM_MEMORY         - Enable short-term memory via Qdrant store_context (default: true)
#   FAULTLINE_USER_ID         - Default user UUID for MCP server (optional)
#   MCP_API_KEY               - API key for MCP server authentication (optional)
#
# REQUIRED FOR OPENWEBUI FILTER (set as environment variables in OpenWebUI container):
#   REDIS_URL                 - Redis connection URL for inlet dedup (redis://faultline-redis:6379/0)
#                               This MUST be set for the FaultLine Filter to work properly.
#                               If not set, deduplication will fail and duplicate embeddings will cascade.
#
# CRITICAL: Model names must match exactly what LM Studio reports in /v1/models endpoint.
# HTTP 400 errors indicate model name mismatch (e.g., qwen-qwen3.5-9b vs qwen/qwen3.5-9b).
#
# NOTE: OpenWebUI Filter requires FAULTLINE_URL to be set in Portainer Function Valve settings
# (FaultLine Filter → Configuration → FAULTLINE_URL = http://your-host:8001)
#
# KNOWN ISSUE: If extraction requests fail repeatedly (ingest.extraction_failed errors),
# check FaultLine logs for traceback. Common causes:
# - Model name mismatch between WGM_LLM_MODEL env var and available models on LM Studio
# - Bearer token (LLM_API_KEY) invalid or missing
# - OpenWebUI endpoint unreachable or returning 401/400 errors

services:

  faultline:
    image: faultline-wgm:latest
    container_name: faultline
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      POSTGRES_DSN: postgresql://faultline:${POSTGRES_PASSWORD}@postgres:5432/faultline_test
      LLM_BASE_URL: ${LLM_BASE_URL:-http://open-webui:8080}
      LLM_BACKEND_TYPE: ${LLM_BACKEND_TYPE:-openwebui}
      LLM_API_KEY: ${LLM_API_KEY}
      FAULTLINE_URL: ${FAULTLINE_URL:-http://faultline:8000}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: faultline-test
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REEMBED_INTERVAL: ${REEMBED_INTERVAL:-300}
      SHORT_TERM_MEMORY: ${SHORT_TERM_MEMORY:-true}
      WGM_LLM_MODEL: ${WGM_LLM_MODEL}
      CATEGORY_LLM_MODEL: ${CATEGORY_LLM_MODEL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-15}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openweb_ui_default
      - rag-ai-qdrant_default

  faultline-mcp:
    image: faultline-wgm:latest
    container_name: faultline-mcp
    restart: unless-stopped
    entrypoint: ["python", "tools/mcp_server.py", "--transport", "http", "--port", "8002"]
    ports:
      - "8002:8002"
    environment:
      FAULTLINE_API_URL: http://faultline:8000
      FAULTLINE_USER_ID: ${FAULTLINE_USER_ID:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
    depends_on:
      - faultline
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openweb_ui_default

  postgres:
    image: postgres:16-alpine
    container_name: faultline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: faultline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faultline}
      POSTGRES_DB: faultline_test
      POSTGRES_MAX_CONNECTIONS: "200"
      POSTGRES_SHARED_BUFFERS: "256MB"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faultline -d faultline_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openweb_ui_default

  redis:
    image: redis:7-alpine
    container_name: faultline-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - openweb_ui_default

volumes:
  pg-data:
    name: faultline-pg-data

networks:
  # Reference to existing OpenWebUI network (for LLM communication)
  openweb_ui_default:
    external: true
    name: openweb_ui_default

  # Reference to existing Qdrant network
  rag-ai-qdrant_default:
    external: true
    name: rag-ai-qdrant_default
