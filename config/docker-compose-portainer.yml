# FaultLine — Portainer Stack
#
# This is the one intentional fork of the canonical ../docker-compose.yml:
# Portainer deploys from a PRE-BUILT image (no build context), so build and
# tag it on your Docker host first:
#
#   cd /path/to/FaultLine
#   docker build -t faultline:latest .
#
# DEPLOYMENT
#   Stacks → Add Stack → Web Editor (paste this) or Git Repository
#   (Compose path: config/docker-compose-portainer.yml)
#
# LLM HOOK (set in Portainer's "Environment variables" tab) — FaultLine talks to
# an LLM you already run; it does not host one:
#   LLM_BACKEND_TYPE   openwebui | ollama | lm_studio | openai | anthropic | groq | localai | raw
#   LLM_BASE_URL       host + port only, e.g. http://open-webui:8080 or http://192.168.1.x:1234
#   LLM_API_KEY        bearer / api key (blank for local servers that need none)
#   WGM_LLM_MODEL      extraction model name — must match what the backend reports
#   CATEGORY_LLM_MODEL category inference model name
#   POSTGRES_PASSWORD  database password for the 'faultline' user (optional)
#
# Model name must match exactly what the backend's /v1/models reports.
# HTTP 400 from the LLM usually means a model-name mismatch.

services:

  faultline:
    image: faultline:latest
    container_name: faultline-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: postgresql://faultline:${POSTGRES_PASSWORD:-faultline}@postgres:5432/faultline
      POSTGRES_HOST: postgres
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-faultline-test}
      REDIS_URL: redis://redis:6379/0
      LLM_BACKEND_TYPE: ${LLM_BACKEND_TYPE:-openwebui}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://open-webui:8080}
      LLM_API_KEY: ${LLM_API_KEY:-}
      WGM_LLM_MODEL: ${WGM_LLM_MODEL:-qwen2.5}
      CATEGORY_LLM_MODEL: ${CATEGORY_LLM_MODEL:-qwen2.5}
      FAULTLINE_API_URL: http://faultline:8000
      REEMBED_INTERVAL: ${REEMBED_INTERVAL:-5}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-15}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - faultline-net

  faultline-mcp:
    image: faultline:latest
    container_name: faultline-mcp
    entrypoint: ["python", "tools/mcp_server.py", "--transport", "http", "--port", "8002"]
    ports:
      - "8002:8002"
    environment:
      FAULTLINE_API_URL: http://faultline:8000
      FAULTLINE_USER_ID: ${FAULTLINE_USER_ID:-}
      MCP_API_KEY: ${MCP_API_KEY:-}
    depends_on:
      - faultline
    networks:
      - faultline-net

  postgres:
    image: postgres:16-alpine
    container_name: faultline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: faultline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faultline}
      POSTGRES_DB: faultline
      POSTGRES_MAX_CONNECTIONS: "200"
      POSTGRES_SHARED_BUFFERS: "256MB"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faultline -d faultline"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - faultline-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: faultline-qdrant
    restart: unless-stopped
    ports:
      - "6334:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL",
             "wget -qO- http://localhost:6333/healthz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - faultline-net

  redis:
    image: redis:7-alpine
    container_name: faultline-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - faultline-net

volumes:
  pg-data:
    name: faultline-pg-data
  qdrant-data:
    name: faultline-qdrant-data
  redis-data:
    name: faultline-redis-data

networks:
  faultline-net:
    name: faultline-net
    driver: bridge
